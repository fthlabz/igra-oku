<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İkra Oku - Premium Kur'an Okuyucu</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --bg-color: #131314;
            --surface-color: #1e1f20;
            --text-primary: #e3e3e3;
            --text-secondary: #c4c7c5;
            --accent-color: #a8c7fa;
            --border-color: #444746;
            --base-font-size: 16px;
        }

        body {
            background-color: var(--bg-color); color: var(--text-primary);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 0; line-height: 1.6; overflow-x: hidden; width: 100%;
        }

        .container { width: 100%; max-width: 800px; margin: 0 auto; padding: 15px; overflow-x: hidden; }

        /* Üst Kontrol Çubuğu (Ana Ekran) */
        .toolbar {
            position: sticky; top: 0; background-color: rgba(19, 19, 20, 0.95);
            padding: 15px 0; z-index: 100; border-bottom: 1px solid var(--border-color);
            display: flex; flex-direction: column; gap: 10px; width: 100%;
        }

        .toolbar-top { display: flex; gap: 10px; width: 100%; }

        .search-bar {
            flex-grow: 1; padding: 12px 15px; border-radius: 24px;
            border: 1px solid var(--border-color); background-color: var(--surface-color);
            color: var(--text-primary); font-size: 1rem; outline: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2); width: 100%;
        }
        .search-bar:focus { border-color: var(--accent-color); }

        .btn-group { display: flex; gap: 5px; flex-shrink: 0; }
        
        button {
            background-color: var(--surface-color); color: var(--accent-color);
            border: 1px solid var(--border-color); padding: 8px 12px;
            border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1rem;
            display: flex; align-items: center; justify-content: center;
        }

        select.sure-secici {
            width: 100%; padding: 12px 15px; border-radius: 8px;
            border: 1px solid var(--border-color); background-color: var(--surface-color);
            color: var(--accent-color); font-size: 1rem; font-weight: 500;
            appearance: none; outline: none; cursor: pointer;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23a8c7fa%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.4-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat; background-position: right 15px top 50%; background-size: 12px auto;
        }

        /* Ana Ekran Kartları */
        #icerikAlani { font-size: var(--base-font-size); transition: font-size 0.3s ease; width: 100%; padding-bottom: 20px;}
        #detayGorunum { font-size: var(--base-font-size); transition: font-size 0.3s ease; display: none; width: 100%; }

        .ayet-karti {
            background-color: var(--surface-color); border-radius: 12px;
            padding: 20px 20px 15px 20px; margin-bottom: 20px; border: 1px solid transparent;
            cursor: pointer; transition: transform 0.1s, border-color 0.2s;
            width: 100%; word-wrap: break-word;
        }
        .ayet-karti:active { transform: scale(0.98); }

        .ayet-baslik {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color); padding-bottom: 10px;
            margin-bottom: 15px; color: var(--accent-color); font-weight: bold;
        }

        .arapca-metin { font-size: 1.6em; text-align: right; margin-bottom: 15px; direction: rtl; line-height: 1.8; color: #fff;}
        .meal-metin { font-size: 1.1em; color: var(--text-primary); }

        /* Yeni: Profesyonel Detay Butonu (Kart İçi) */
        .kart-aksiyon {
            margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; align-items: center;
            color: var(--accent-color); font-weight: 500; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .kart-aksiyon .ikon { font-size: 1.2rem; transition: transform 0.2s; }
        .ayet-karti:hover .kart-aksiyon .ikon { transform: translateX(5px); }

        .icon-btn { background: transparent; border: none; font-size: 1.5rem; padding: 5px; cursor: pointer; }

        /* Detay Ekranı Geri Dönüş Barları */
        .detay-header-bar {
            position: sticky; top: 0; background-color: rgba(19, 19, 20, 0.95);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 15px 20px; z-index: 100; border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; gap: 10px; color: var(--accent-color);
            font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-bottom: 20px;
        }
        .detay-footer-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background-color: rgba(30, 31, 32, 0.95); border-top: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 15px; display: flex; justify-content: center; align-items: center;
            color: var(--text-primary); cursor: pointer; font-weight: bold; z-index: 1000; font-size: 1.1rem;
        }
        .detay-header-bar:active, .detay-footer-bar:active { background-color: rgba(168, 199, 250, 0.1); }

        /* Detay Ekranı İçerik Stilleri */
        #detayIcerik { padding-bottom: 80px; padding-left: 15px; padding-right: 15px; } /* Footerın arkasında kalmaması için */
        .madde-kutu { margin-bottom: 20px; background: rgba(0,0,0,0.2); border-radius: 8px; padding: 15px; width: 100%; overflow-x: hidden; word-wrap: break-word;}
        .madde-baslik { color: var(--accent-color); font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 10px; text-transform: uppercase; font-size: 0.85em; letter-spacing: 0.5px;}
        .madde-icerik { color: var(--text-secondary); line-height: 1.7; }
        
        .lafzi-satir { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #444; }
        .lafzi-satir:last-child { border-bottom: none; }
        .lafzi-arapca { color: var(--accent-color); font-size: 1.3em; direction: rtl; text-align: right; flex-shrink: 0; margin-left: 10px;}
        .lafzi-turkce { color: var(--text-primary); flex-grow: 1; }

        /* Yükleniyor Animasyonu */
        .loader-container { text-align: center; color: var(--accent-color); margin-top: 50px; font-weight: 500; }
        .spinner {
            display: inline-block; width: 30px; height: 30px;
            border: 3px solid rgba(168, 199, 250, 0.3); border-radius: 50%;
            border-top-color: var(--accent-color); animation: spin 1s ease-in-out infinite;
            margin-bottom: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Detay Sayfası Seslendirme Butonu */
        .tam-seslendir-btn {
            width: 100%; background: var(--accent-color); color: #131314; border: none;
            padding: 12px; border-radius: 8px; font-weight: bold; font-size: 1.1rem;
            margin-bottom: 20px; cursor: pointer; display: flex; align-items: center;
            justify-content: center; gap: 10px; box-shadow: 0 4px 10px rgba(168, 199, 250, 0.2);
        }
    </style>
</head>
<body>

<div class="container" id="anaKapsayici">
    <div id="anaGorunum">
        <div class="toolbar" id="ustBar">
            <div class="toolbar-top">
                <input type="text" id="aramaKutusu" class="search-bar" placeholder="Örn: 1.2, Fatiha 2..." onkeypress="aramaTetikle(event)">
                <div class="btn-group">
                    <button onclick="verileriGuncelle()" title="Veritabanını Yenile (Zorla Güncelle)">🔄</button>
                    <button onclick="fontDegistir(-2)">A-</button>
                    <button onclick="fontDegistir(2)">A+</button>
                </div>
            </div>
            <select id="sureSecici" class="sure-secici" onchange="sureSecildi()">
                <option value="" disabled selected>📖 İncelemek İstediğiniz Bölümü Seçin...</option>
                <option value="fatiha">1. Fatiha Suresi (Tamamı)</option>
                <option value="bakara_1_50">2. Bakara Suresi (1-50. Ayetler)</option>
            </select>
        </div>

        <div id="icerikAlani">
            <div style="text-align:center; color:#c4c7c5; margin-top:60px; font-size:1.1rem;">
                Yukarıdan bir bölüm seçin veya ayet arayın.<br><br>
                <span style="color:var(--accent-color);">Örnek Aramalar:</span><br>
                "1.2" (1. Sure 2. Ayet)<br>
                "Bakara 5" (Bakara 5. Ayet)
            </div>
        </div>
    </div>
</div>

<div id="detayGorunum">
    <div class="detay-header-bar" onclick="geriDon()">
        <span>⬅</span> Geri Dön
    </div>
    
    <div class="container" id="detayIcerik"></div>
    
    <script>
    // --- HAYALET KİLİT (GÜVENLİK) ---
    const sifreliKasa = "U2FsdGVkX18/lJl972BXHtLWMJtL4r5ElhRF+00ZZFXVZDaO6wDQYheXD+9RKs0e1aKkahcXFASdmf3EaLNafw==";
    const gizliPin = "1453";

    function getGitHubToken() {
        try { return CryptoJS.AES.decrypt(sifreliKasa, gizliPin).toString(CryptoJS.enc.Utf8); } 
        catch (e) { return null; }
    }

    const username = "fthlabz"; 
    const repo = "igra-oku";
    let aktifSureVerisi = []; 
    let mevcutAnalizMetni = ""; 

    // --- YENİLEME / GÜNCELLEME ---
    function verileriGuncelle() {
        for (let key in localStorage) {
            if (key.startsWith("sure_")) {
                localStorage.removeItem(key);
            }
        }
        const secilenDosya = document.getElementById("sureSecici").value;
        if(secilenDosya) {
            sureYukle(secilenDosya); 
        } else {
            alert("Sistem hafızası temizlendi. İndirmek istediğiniz dosyayı seçebilirsiniz.");
            document.getElementById("icerikAlani").innerHTML = `<div style="text-align:center; margin-top:50px;">Hafıza temizlendi. Lütfen bir bölüm seçin.</div>`;
        }
    }

    function sureSecildi() {
        const secilen = document.getElementById("sureSecici").value;
        if(secilen) sureYukle(secilen);
    }

    function dosyaBul(sureAdi, ayetNo) {
        if (sureAdi === "1" || sureAdi === "fatiha") return "fatiha";
        if (sureAdi === "2" || sureAdi === "bakara") {
            let a = parseInt(ayetNo);
            if (a >= 1 && a <= 50) return "bakara_1_50";
            if (a >= 51 && a <= 100) return "bakara_51_100";
            if (a >= 101 && a <= 150) return "bakara_101_150";
            if (a >= 151 && a <= 200) return "bakara_151_200";
            if (a >= 201 && a <= 250) return "bakara_201_250";
            if (a >= 251 && a <= 286) return "bakara_251_286";
        }
        return null;
    }

    // --- AKILLI ARAMA MOTORU ---
    function aramaTetikle(e) {
        if (e.key === 'Enter' || e.keyCode === 13) akilliArama();
    }

    async function akilliArama() {
        const girdi = document.getElementById("aramaKutusu").value.trim().toLowerCase();
        if (!girdi) return;

        document.getElementById("aramaKutusu").blur();
        document.getElementById("anaKapsayici").style.display = "block";
        document.getElementById("detayGorunum").style.display = "none";
        document.getElementById("icerikAlani").innerHTML = `<div class="loader-container"><div class="spinner"></div><div>Ayet Aranıyor...</div></div>`;

        let sureNo = null; let ayetNo = null;

        let matchNumara = girdi.match(/^(\d+)[.:\s](\d+)$/);
        if (matchNumara) { sureNo = matchNumara[1]; ayetNo = matchNumara[2]; }
        
        let matchIsim = girdi.match(/^([a-zçğıöşü]+)\s+(\d+)$/);
        if (matchIsim) { sureNo = matchIsim[1]; ayetNo = matchIsim[2]; }

        if (sureNo && ayetNo) {
            let dosyaAdi = dosyaBul(sureNo, ayetNo);
            if (dosyaAdi) {
                await tekAyetGetir(dosyaAdi, ayetNo);
            } else {
                document.getElementById("icerikAlani").innerHTML = `<div style="text-align:center; color:red; margin-top:30px;">Bu ayet aralığı henüz sisteme eklenmemiş.</div>`;
            }
        } else {
            if (aktifSureVerisi.length > 0) {
                const kartlar = document.querySelectorAll("#icerikAlani .ayet-karti");
                kartlar.forEach(kart => {
                    if (kart.innerText.toLowerCase().includes(girdi)) kart.style.display = "block";
                    else kart.style.display = "none";
                });
                document.getElementById("icerikAlani").querySelectorAll('.loader-container').forEach(e => e.remove());
            } else {
                 document.getElementById("icerikAlani").innerHTML = `<div style="text-align:center; margin-top:30px;">Kelime araması yapmak için önce listeden bir sure bölümü yükleyin.</div>`;
            }
        }
    }

    async function tekAyetGetir(dosyaAdi, ayetNo) {
        const icerikAlani = document.getElementById("icerikAlani");
        let sureVerisi = localStorage.getItem(`sure_${dosyaAdi}`);
        
        if (sureVerisi) {
            sureVerisi = JSON.parse(sureVerisi);
        } else {
            const token = getGitHubToken();
            const url = `https://api.github.com/repos/${username}/${repo}/contents/${dosyaAdi}.json`;
            try {
                const response = await fetch(url, { method: "GET", headers: { "Authorization": `token ${token}`, "Accept": "application/vnd.github.v3.raw" }});
                if (!response.ok) throw new Error();
                sureVerisi = await response.json();
                localStorage.setItem(`sure_${dosyaAdi}`, JSON.stringify(sureVerisi));
            } catch (err) {
                icerikAlani.innerHTML = `<div style="text-align:center; color:red; margin-top:30px;">Hata: JSON dosyası GitHub'da bulunamadı (${dosyaAdi}.json).</div>`;
                return;
            }
        }

        const arananAyet = sureVerisi.find(a => a.ayet_no == ayetNo);
        if (arananAyet) {
            aktifSureVerisi = sureVerisi; 
            document.getElementById("sureSecici").value = dosyaAdi; 
            ekranaCiz([arananAyet]); 
        } else {
            icerikAlani.innerHTML = `<div style="text-align:center; color:red; margin-top:30px;">Ayet bulunamadı.</div>`;
        }
    }

    async function sureYukle(dosyaAdi) {
        document.getElementById("anaKapsayici").style.display = "block";
        document.getElementById("detayGorunum").style.display = "none";
        document.getElementById("aramaKutusu").value = "";

        const icerikAlani = document.getElementById("icerikAlani");
        icerikAlani.innerHTML = `<div class="loader-container"><div class="spinner"></div><div>Yükleniyor, lütfen bekleyiniz...</div></div>`;
        
        const yerelVeri = localStorage.getItem(`sure_${dosyaAdi}`);
        
        if (yerelVeri) {
            aktifSureVerisi = JSON.parse(yerelVeri);
            ekranaCiz(aktifSureVerisi);
            return; 
        }

        const token = getGitHubToken();
        if (!token) { icerikAlani.innerHTML = "Güvenlik Hatası!"; return; }
        const url = `https://api.github.com/repos/${username}/${repo}/contents/${dosyaAdi}.json`;

        try {
            const response = await fetch(url, { method: "GET", headers: { "Authorization": `token ${token}`, "Accept": "application/vnd.github.v3.raw" }});
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            aktifSureVerisi = await response.json();
            localStorage.setItem(`sure_${dosyaAdi}`, JSON.stringify(aktifSureVerisi));
            ekranaCiz(aktifSureVerisi);
        } catch (error) {
            icerikAlani.innerHTML = `<div style="text-align:center; color:red; margin-top:50px;">Veri çekilemedi. JSON dosyanız hatalı veya GitHub'da yok.</div>`;
        }
    }

    // --- ANA EKRAN KARTI ÇİZİMİ ---
    function ekranaCiz(veriler) {
        const icerikAlani = document.getElementById("icerikAlani");
        icerikAlani.innerHTML = "";

        veriler.forEach(ayet => {
            const orijinal = ayet.analiz_modeli["1_orijinal_metin_ve_meal"];
            const okunacakMetin = orijinal.meal_diyanet.replace(/'/g, "\\'").replace(/"/g, "");

            const kartHTML = `
                <div class="ayet-karti" onclick="detayGoster(${ayet.ayet_no})">
                    <div class="ayet-baslik">
                        <span>${ayet.sure_adi} Suresi, ${ayet.ayet_no}. Ayet</span>
                        <button class="icon-btn" onclick="event.stopPropagation(); kisaSesliOku('${okunacakMetin}')" title="Sadece Meali Dinle">🔊</button>
                    </div>
                    <div class="arapca-metin">${orijinal.arapca}</div>
                    <div class="meal-metin">${orijinal.meal_diyanet}</div>
                    
                    <div class="kart-aksiyon">
                        <span>Detaylı Analizi İncele</span>
                        <span class="ikon">➔</span>
                    </div>
                </div>
            `;
            icerikAlani.innerHTML += kartHTML;
        });
    }

    // --- DETAY EKRANINI GÖSTER (RAM'DEN ÇAĞIRIR) ---
    function detayGoster(ayetNo) {
        const ayet = aktifSureVerisi.find(a => a.ayet_no == ayetNo);
        if(!ayet) return;

        const model = ayet.analiz_modeli;
        
        document.getElementById("anaKapsayici").style.display = "none";
        document.getElementById("detayGorunum").style.display = "block";
        window.scrollTo(0,0); 

        const detayIcerik = document.getElementById("detayIcerik");
        mevcutAnalizMetni = `${ayet.sure_adi} suresi ${ayet.ayet_no}. ayet analizi. Orijinal arapçası. `;
        
        let html = `
            <div class="ayet-baslik" style="font-size:1.3em; border-bottom:none;">
                ${ayet.sure_adi} Suresi, ${ayet.ayet_no}. Ayet
            </div>
            
            <button class="tam-seslendir-btn" id="oynatDurdurBtn" onclick="tamAnalizSeslendir()">
                🔊 Tüm Analizi Sesli Dinle
            </button>

            <div class="madde-kutu" style="background:var(--surface-color); border:1px solid var(--border-color);">
                <div class="arapca-metin">${model["1_orijinal_metin_ve_meal"].arapca}</div>
                <div class="meal-metin" style="text-align:center; font-style:italic;">"${model["1_orijinal_metin_ve_meal"].meal_diyanet}"</div>
            </div>
        `;

        mevcutAnalizMetni += `Diyanet meali: ${model["1_orijinal_metin_ve_meal"].meal_diyanet}. `;

        if(model["2_lafzi_ceviri"] && Object.keys(model["2_lafzi_ceviri"]).length > 0) {
            html += `<div class="madde-kutu"><div class="madde-baslik">Lafzî (Kelime Kelime) Çeviri</div><div class="madde-icerik">`;
            mevcutAnalizMetni += "Kelime çevirisi: ";
            for (let arapcaKelime in model["2_lafzi_ceviri"]) {
                const turkceAnlam = model["2_lafzi_ceviri"][arapcaKelime];
                html += `<div class="lafzi-satir"><span class="lafzi-turkce">${turkceAnlam}</span><span class="lafzi-arapca">${arapcaKelime}</span></div>`;
                mevcutAnalizMetni += `${turkceAnlam}. `;
            }
            html += `</div></div>`;
        }

        const baslikHaritası = {
            "3_morfolojik_ve_sentaktik_cozumleme": "Morfolojik ve Sentaktik Çözümleme",
            "4_kiraat_farkliliklari": "Kıraat Farklılıkları",
            "5_etimolojik_cozumleme_ve_cahiliye_referanslari": "Etimolojik Çözümleme",
            "6_kuran_ici_kavram_agi": "Kur'an İçi Kavram Ağı",
            "7_esbab_i_nuzul_ve_tarihsel_baglam": "İniş Sebebi ve Bağlam",
            "8_siyak_ve_sibak_baglam": "Siyak ve Sibak",
            "9_belagat_ve_edebi_nazim": "Belâgat ve Edebi Nazım",
            "10_fonetik_ve_akustik_analiz": "Fonetik ve Akustik Analiz",
            "11_tematik_capraz_okuma": "Tematik Çapraz Okuma",
            "12_klasik_tefsir_perspektifi": "Klasik Tefsir Perspektifi",
            "13_ontolojik_ve_metafizik_okuma": "Ontolojik Metafizik Okuma",
            "14_hukuki_ve_ahlaki_cikarimlar": "Hukuki ve Ahlaki Çıkarımlar",
            "15_cagdas_izdusum": "Çağdaş İzdüşüm"
        };

        for (let key in baslikHaritası) {
            if (model[key]) {
                let icerik = "";
                mevcutAnalizMetni += `${baslikHaritası[key]}... `;

                if(typeof model[key] === 'object' && key === "8_siyak_ve_sibak_baglam") {
                    icerik = `<strong>Analiz:</strong> ${model[key].baglam_analizi || ''}`;
                    mevcutAnalizMetni += `${model[key].baglam_analizi}. `;
                } else {
                    icerik = model[key];
                    mevcutAnalizMetni += `${model[key]}. `;
                }

                html += `
                <div class="madde-kutu">
                    <div class="madde-baslik">${baslikHaritası[key]}</div>
                    <div class="madde-icerik">${icerik}</div>
                </div>`;
            }
        }

        detayIcerik.innerHTML = html;
    }

    // --- GERİ DÖN ---
    function geriDon() {
        if ('speechSynthesis' in window) { window.speechSynthesis.cancel(); } 
        document.getElementById("detayGorunum").style.display = "none";
        document.getElementById("anaKapsayici").style.display = "block";
    }

    // --- FONT ---
    let guncelFontBoyutu = 16;
    function fontDegistir(deger) {
        guncelFontBoyutu += deger;
        if (guncelFontBoyutu < 12) guncelFontBoyutu = 12; 
        if (guncelFontBoyutu > 32) guncelFontBoyutu = 32; 
        document.documentElement.style.setProperty('--base-font-size', guncelFontBoyutu + 'px');
    }

    // --- SESLENDİRME ---
    function kisaSesliOku(metin) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); 
            const mesaj = new SpeechSynthesisUtterance(metin);
            mesaj.lang = 'tr-TR'; mesaj.rate = 0.9;
            window.speechSynthesis.speak(mesaj);
        }
    }

    let seslendirmeDurumu = false;
    function tamAnalizSeslendir() {
        if (!('speechSynthesis' in window)) { alert("Cihazınız sesli okumayı desteklemiyor."); return; }
        const btn = document.getElementById("oynatDurdurBtn");

        if (window.speechSynthesis.speaking) {
            window.speechSynthesis.cancel(); 
            btn.innerHTML = "🔊 Tüm Analizi Sesli Dinle";
            seslendirmeDurumu = false;
        } else {
            const mesaj = new SpeechSynthesisUtterance(mevcutAnalizMetni);
            mesaj.lang = 'tr-TR'; mesaj.rate = 0.85; 
            mesaj.onend = function() { btn.innerHTML = "🔊 Tüm Analizi Sesli Dinle"; seslendirmeDurumu = false; };
            window.speechSynthesis.speak(mesaj);
            btn.innerHTML = "⏹ Okumayı Durdur";
            seslendirmeDurumu = true;
        }
    }
</script>

</body>
</html>
